    <style>
        :root {
            --font-main: 'Poppins', sans-serif;
            --glass-bg: rgba(244, 246, 249, 0.85);
            --glass-border: rgba(200, 200, 200, 0.4);
            --glass-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --text-main: #334155;
            --text-muted: #64748b;
            --primary-color: #e019b8;
            --secondary-color: #c39bd3;
            --accent-color: #00bcd4;
            --pin-border: transparent;
            --line-fg: #1e293b;
            --line-bg: rgba(255,255,255,0.9);
            --text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
            --popup-bg: rgba(255, 255, 255, 0.95);
        }
        .dark-mode {
            --glass-bg: rgba(30, 41, 59, 0.85);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --primary-color: #00e5ff;
            --secondary-color: #ff00ff;
            --accent-color: #ff00ff;
            --pin-border: #ff00ff;
            --line-fg: #ff00ff;
            --line-bg: rgba(15, 23, 42, 0.8);
            --text-shadow: -1px -1px 0 #1e293b, 1px -1px 0 #1e293b, -1px 1px 0 #1e293b, 1px 1px 0 #1e293b;
            --popup-bg: rgba(30, 41, 59, 0.95);
        }

        * { font-family: var(--font-main); box-sizing: border-box; }
        input, select { background: transparent; color: var(--text-main); }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow);
            color: var(--text-main); border-radius: 12px; transition: opacity 0.3s ease, background 0.3s ease;
        }

        .nav-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 10px 15px; border-radius: 50px;
            font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.3s; color: var(--text-main); justify-content: center;
        }
        .nav-btn:hover { transform: translateY(-1px); background: rgba(128,128,128,0.1); }

        .icon-btn {
            width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 18px; border: 1px solid var(--glass-border); background: var(--glass-bg);
            box-shadow: var(--glass-shadow); transition: 0.3s; color: var(--text-main);
        }
        .icon-btn:hover { background: rgba(128,128,128,0.1); }

        .filter-pill {
            background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);
            padding: 4px 10px; border-radius: 50px; font-size: 11px; font-weight: 500; cursor: pointer; transition: 0.3s;
        }
        .filter-pill.active { background: var(--primary-color); border-color: var(--primary-color); color: #fff; }

        .stations-table-row { cursor:pointer; border-bottom: 1px solid rgba(128,128,128,0.15); transition: background 0.2s; }
        .stations-table-row:hover { background-color: rgba(128,128,128,0.1); }

        .custom-cluster {
            background-color: rgba(224, 25, 184, 0.6); color: white; border: none; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-weight: 600; font-size: 14px;
            transition: all 0.3s ease; box-shadow: 0 0 10px rgba(224, 25, 184, 0.3);
        }
        .dark-mode .custom-cluster { background-color: rgba(0, 229, 255, 0.5); box-shadow: 0 0 10px rgba(0, 229, 255, 0.3); }

        .poly-measure { stroke: var(--primary-color); fill: var(--primary-color); transition: stroke 0.3s, fill 0.3s; }
        .poly-measure-line { stroke: var(--primary-color); transition: stroke 0.3s; }
        .measure-point { fill: white; stroke: var(--primary-color); transition: stroke 0.3s; }

        .measure-label {
            color: var(--text-main); font-size: 11px; font-weight: 700; white-space: nowrap;
            text-shadow: var(--text-shadow); pointer-events: none; transition: color 0.3s;
            position: absolute; transform: translate(-50%, -50%);
        }
        .measure-center-label {
            color: var(--primary-color); font-size: 13px; font-weight: 800; text-align: center; line-height: 1.3;
            white-space: nowrap; text-shadow: var(--text-shadow); pointer-events: none; transition: color 0.3s;
            position: absolute; transform: translate(-50%, -50%);
        }

        .map-title-editor {
            font-size: 26px; font-weight: 800; color: var(--text-main); text-shadow: var(--text-shadow);
            text-transform: uppercase; letter-spacing: 2px; outline: none; background: transparent;
            transition: 0.3s; padding: 2px 10px; border-radius: 8px; border: 1px solid transparent;
        }
        .map-title-editor:hover, .map-title-editor:focus { background: var(--glass-bg); backdrop-filter: blur(5px); border-color: var(--glass-border); }

        .map-subtitle-editor {
            font-size: 14px; font-weight: 600; color: var(--primary-color); text-shadow: var(--text-shadow);
            outline: none; padding: 2px 10px; border-radius: 8px; border: 1px solid transparent; margin-top:-5px;
        }
        .map-subtitle-editor:hover, .map-subtitle-editor:focus { background: var(--glass-bg); backdrop-filter: blur(5px); border-color: var(--glass-border); }

        .scale-container { display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        .scale-graphic-bar { height: 6px; width: 150px; border: 2px solid var(--text-main); border-top: none; position: relative; margin-bottom: 2px; }
        #scale_fill { height: 100%; background: var(--primary-color); opacity: 0.6; transition: width 0.1s; }
        .scale-text-km { font-size: 12px; font-weight: 800; color: var(--text-main); text-shadow: var(--text-shadow); margin-bottom:-3px; pointer-events:none; }
        .scale-text-frac { font-size: 11px; font-weight: 600; color: var(--text-muted); text-shadow: var(--text-shadow); letter-spacing:1px; pointer-events:none; }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: var(--popup-bg) !important; color: var(--text-main) !important; backdrop-filter: blur(10px); border: 1px solid var(--glass-border); }
        .dark-mode .leaflet-bar a { background-color: var(--glass-bg); color: var(--text-main); border-bottom: 1px solid var(--glass-border); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }

        #loader_overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 100005;
            justify-content: center; align-items: center; transition: opacity 0.3s;
        }
        .spinner-ring {
            width: 45px; height: 45px; border: 3px solid var(--glass-border); border-top: 3px solid var(--primary-color); border-right: 3px solid var(--accent-color); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulseAura { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }
        .gps-aura { transform-origin: center; animation: pulseAura 1.5s infinite ease-out; fill: var(--secondary-color); transition: fill 0.3s; }
        .gps-core { fill: var(--primary-color); transition: fill 0.3s; }
    </style>

        function latLonToUTM(lat, lon) {
            const a = 6378137.0, ecc = 0.0033528106647474805, k0 = 0.9996;
            const latRad = lat * Math.PI / 180.0, lonRad = lon * Math.PI / 180.0;
            const zone = Math.floor((lon + 180.0) / 6) + 1;
            const lonOrigin = (zone - 1) * 6 - 180 + 3;
            const lonOriginRad = lonOrigin * Math.PI / 180.0;
            const eccPrimeSquared = (ecc) / (1 - ecc);
            const N = a / Math.sqrt(1 - ecc * Math.sin(latRad) * Math.sin(latRad));
            const T = Math.tan(latRad) * Math.tan(latRad);
            const C = eccPrimeSquared * Math.cos(latRad) * Math.cos(latRad);
            const A = Math.cos(latRad) * (lonRad - lonOriginRad);
            const M = a * ((1 - ecc / 4 - 3 * ecc * ecc / 64 - 5 * ecc * ecc * ecc / 256) * latRad - (3 * ecc / 8 + 3 * ecc * ecc / 32 + 45 * ecc * ecc * ecc / 1024) * Math.sin(2 * latRad) + (15 * ecc * ecc / 256 + 45 * ecc * ecc * ecc / 1024) * Math.sin(4 * latRad) - (35 * ecc * ecc * ecc / 3072) * Math.sin(6 * latRad));
            const e = k0 * N * (A + (1 - T + C) * A * A * A / 6 + (5 - 18 * T + T * T + 72 * C - 58 * eccPrimeSquared) * A * A * A * A * A / 120) + 500000.0;
            const n = k0 * (M + N * Math.tan(latRad) * (A * A / 2 + (5 - T + 9 * C + 4 * C * C) * A * A * A * A / 24 + (61 - 58 * T + T * T + 600 * C - 330 * eccPrimeSquared) * A * A * A * A * A * A / 720)) + (lat < 0 ? 10000000.0 : 0);
            const letters = "CDEFGHJKLMNPQRSTUVWXX";
            const lIdx = Math.max(0, Math.min(20, Math.floor((lat + 80) / 8)));
            return { e: e, n: n, zone: zone, letter: letters.charAt(lIdx) };
        }

        function fastHaversine(lat1, lon1, lat2, lon2) {
            const p = 0.017453292519943295;
            const c = Math.cos;
            const a = 0.5 - c((lat2 - lat1) * p)/2 + c(lat1 * p) * c(lat2 * p) * (1 - c((lon2 - lon1) * p))/2;
            return 12742 * Math.asin(Math.sqrt(a)) * 1000;
        }

        function updateScale() {
            if(!ml) return;
            const center = ml.getCenter(); 
            const zoom = ml.getZoom();
            const metersPerPixel = (Math.cos(center.lat * Math.PI / 180) * 2 * Math.PI * 6378137) / (256 * Math.pow(2, zoom));
            const scaleFraction = Math.round(metersPerPixel * 3779.527);
            document.getElementById('scale_val_frac').innerText = 'Escala 1:' + scaleFraction.toLocaleString('es-CL');

            const maxWidth = 150; 
            const maxMeters = maxWidth * metersPerPixel;
            const pow10 = Math.pow(10, (Math.floor(maxMeters) + '').length - 1);
            const d = maxMeters / pow10;
            const roundMeters = pow10 * (d >= 10 ? 10 : d >= 5 ? 5 : d >= 3 ? 3 : d >= 2 ? 2 : 1);

            const ratio = roundMeters / maxMeters;
            document.getElementById('scale_fill').style.width = (ratio * 100) + '%';
            document.getElementById('scale_val_km').innerText = roundMeters >= 1000 ? (roundMeters / 1000) + ' km' : roundMeters + ' m';
        }

        function calculateArea(pts) {
            const r = 6378137, d2r = Math.PI / 180;
            let area = 0;
            for (let i = 0; i < pts.length; i++) {
                const p1 = pts[i], p2 = pts[(i + 1) % pts.length];
                area += (p2.lng - p1.lng) * d2r * (2 + Math.sin(p1.lat * d2r) + Math.sin(p2.lat * d2r));
            }
            return Math.abs(area * r * r / 2.0);
        }

                L.circleMarker(p1, {radius: 4, className: 'measure-point', fillOpacity: 1, weight: 2}).addTo(newGrp);
            }
            const perimKm = (totalDist/1000).toFixed(2);

            const centerHtml = '<div class="measure-center-label">Área: ' + areaKm2 + ' km²<br>Perímetro: ' + perimKm + ' km</div>';
            L.marker(poly.getBounds().getCenter(), {icon: L.divIcon({html: centerHtml, className: '', iconSize: [0,0]})}).addTo(newGrp);

            let popupHtml = '<div style="font-family:var(--font-main); font-size:11px; min-width:200px;">';
            popupHtml += '<h4 style="margin:0 0 5px 0; color:var(--primary-color); border-bottom:1px solid var(--glass-border); padding-bottom:5px;">📐 ' + name + '</h4>';
            popupHtml += '<b>Área:</b> ' + areaKm2 + ' km²<br><b>Perímetro:</b> ' + perimKm + ' km<br><br>';
            popupHtml += '<div style="max-height:120px; overflow-y:auto;">';
            measurePts.forEach(function(pt, i) {
                const utm = latLonToUTM(pt.lat, pt.lng);
                popupHtml += '<b>Vértice '+(i+1)+':</b> ' + pt.lat.toFixed(5) + ', ' + pt.lng.toFixed(5) + '<br>';
                popupHtml += '<span style="color:var(--text-muted); font-size:9.5px;">UTM: '+utm.e.toFixed(1)+' E, '+utm.n.toFixed(1)+' N (Z '+utm.zone+utm.letter+')</span><br><hr style="border:0; border-top:1px solid var(--glass-border); margin:3px 0;">';
            });
            popupHtml += '</div></div>';
            poly.bindPopup(popupHtml);

            savedPolygonsData[pId] = { group: newGrp, name: name, area: areaKm2, perim: perimKm, pts: measurePts.slice() };
            updateLayersPanel(); clearMeasurement(); document.getElementById('poly_name_input').value = '';
        }

        window.toggleSavedPoly = function(id, cb) { if(cb.checked) ml.addLayer(savedPolygonsData[id].group); else ml.removeLayer(savedPolygonsData[id].group); }
        window.deleteSavedPoly = function(id) { ml.removeLayer(savedPolygonsData[id].group); delete savedPolygonsData[id]; updateLayersPanel(); }

        window.toggleNetwork = function(red, btn) {
            if(activeNetworks.has(red)) { activeNetworks.delete(red); btn.classList.remove('active'); }
            else { activeNetworks.add(red); btn.classList.add('active'); }
            renderMapElements();
            if (isTracking && globalUserLatLng) asyncUpdateStations(globalUserLatLng);
        };

        setTimeout(function() {
            for (let k in window) if (k.startsWith("map_") && window[k] instanceof L.Map) { ml = window[k]; break; }
            if (ml) {
                updateThemeCache();
                measureGroup = L.layerGroup().addTo(ml);
                clusterGroup = L.markerClusterGroup({ iconCreateFunction: function(c) { return L.divIcon({ html: '<div class="custom-cluster">' + c.getChildCount() + '</div>', className: '', iconSize: [35, 35] }); }, maxClusterRadius: 45 });
                coverageGroup = L.layerGroup();
                ml.addLayer(clusterGroup); ml.addLayer(coverageGroup);

                window.renderMapElements = function() {
                    clusterGroup.clearLayers(); coverageGroup.clearLayers();
                    for (const k in datos_estaciones) {
                        const e = datos_estaciones[k];
                        if (activeNetworks.has(e.red)) {
                            const m = L.marker([e.lat, e.lon], { icon: L.divIcon({html: svgPin, className: '', iconSize: [28,28], iconAnchor: [14,28]}) }).bindPopup("<b>" + k + "</b><br>" + e.red + "<br>Sats: " + e.sats);
                            clusterGroup.addLayer(m);
                            coverageGroup.addLayer(L.circle([e.lat, e.lon], { radius: currentRadius, color: themeColors.pC, fillColor: themeColors.pC, weight: 0.5, fillOpacity: 0.1 }));
                        }
                    }
                };
                
                renderMapElements(); updateLayersPanel();
                ml.on('moveend zoomend', updateScale); updateScale();

                let baseTile = null; ml.eachLayer(function(l) { if (l instanceof L.TileLayer) baseTile = l; });

                document.getElementById('theme_toggle').addEventListener('click', function() {
                    isDark = !isDark; document.body.classList.toggle('dark-mode', isDark);
                    document.getElementById('theme_icon').innerText = isDark ? '🌙' : '☀️';
                    document.getElementById('theme_icon').style.filter = isDark ? 'none' : 'grayscale(100%)';
                    if (baseTile) baseTile.setUrl(isDark ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png' : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png');
                    updateThemeCache(); renderMapElements();
                    if(measurePts.length > 0) drawMeasurement();
                    if (isTracking && globalUserLatLng) drawNearestStations(globalUserLatLng);
                });

                document.getElementById('buscador').addEventListener('input', function(e) {
                    const n = e.target.value.toUpperCase();
                    if (datos_estaciones[n] && activeNetworks.has(datos_estaciones[n].red)) { ml.setView([datos_estaciones[n].lat, datos_estaciones[n].lon], 14); this.blur(); }
                });

                document.getElementById('buffer_input').addEventListener('input', function(e) {
                    let v = parseFloat(e.target.value); if(isNaN(v) || v < 0) v = 0;
                    currentRadius = v * 1000; coverageGroup.eachLayer(function(l) { l.setRadius(currentRadius); });
                });

                document.getElementById('center_me_btn').addEventListener('click', function() { if(globalUserLatLng) ml.setView(globalUserLatLng, 15); });
                document.getElementById('center_station_btn').addEventListener('click', function() { if(globalNearestCoords) ml.setView(globalNearestCoords, 15); });

                function clearLines() { linesBg.forEach(l=>ml.removeLayer(l)); linesFg.forEach(l=>ml.removeLayer(l)); labels.forEach(l=>ml.removeLayer(l)); linesBg=[]; linesFg=[]; labels=[]; }

                function drawNearestStations(uLatLng) {
                    let numSt = parseInt(document.getElementById('num_stations').value);
                    if (isNaN(numSt) || numSt < 0) numSt = 0;

                    const dists = [];
                    const uLat = uLatLng.lat;
                    const uLon = uLatLng.lng;

                    for (const k in datos_estaciones) {
                        const est = datos_estaciones[k];
                        if(activeNetworks.has(est.red)) {
                            const d = fastHaversine(uLat, uLon, est.lat, est.lon);
                            dists.push({ name: k, lat: est.lat, lon: est.lon, dist: d, red: est.red });
                        }
                    }

                    dists.sort((a, b) => a.dist - b.dist);
                    const tops = dists.slice(0, numSt);

                    clearLines();
                    if(tops.length > 0) globalNearestCoords = L.latLng(tops[0].lat, tops[0].lon);

                    let tHtml = '<h4 style="margin:0 0 12px 0; font-size:13px; font-weight:600; text-align:center;">📍 Conexiones</h4><table style="width:100%; border-collapse:collapse; font-size:11px; text-align:left;">';
                    tHtml += '<tr style="border-bottom: 1px solid var(--primary-color);"><th style="padding-bottom:5px;">Punto</th><th style="padding-bottom:5px;">Distancia</th><th style="padding-bottom:5px;">Red</th><th style="padding-bottom:5px;">Ruta</th></tr>';
                    tHtml += '<tr class="stations-table-row" onclick="goToLocation(' + uLat + ',' + uLon + ', true)"><td style="padding:6px 2px;">👤 Yo</td><td style="color:var(--primary-color); font-weight:bold;">0 km</td><td style="color:var(--text-muted);">-</td><td>-</td></tr>';

                    tops.forEach(function(st) {
                        const stCoords = L.latLng(st.lat, st.lon);
                        linesBg.push(L.polyline([uLatLng, stCoords], {color: themeColors.lBg, weight: 4.5, opacity: 0.9}).addTo(ml));
                        linesFg.push(L.polyline([uLatLng, stCoords], {color: themeColors.lFg, dashArray: '5, 8', weight: 2, opacity: 1}).addTo(ml));

                        const mLat = (uLat + st.lat) / 2;
                        const mLon = (uLon + st.lon) / 2;
                        const dKm = (st.dist / 1000).toFixed(2);

                        const tLab = '<div style="color: '+themeColors.pC+'; font-weight: 600; font-size: 11px; text-shadow: '+themeColors.tS+'; position: absolute; transform: translate(-50%, -50%); width: 70px; text-align: center;">' + dKm + ' km</div>';
                        labels.push(L.marker([mLat, mLon], {icon: L.divIcon({html: tLab, className: 'dist-label-container', iconSize: [0,0]})}).addTo(ml));

                        const mapsUrl = 'https://www.google.com/maps/dir/?api=1&origin=' + uLat + ',' + uLon + '&destination=' + st.lat + ',' + st.lon + '&travelmode=driving';
                        tHtml += '<tr class="stations-table-row" onclick="goToLocation(' + st.lat + ',' + st.lon + ', false)">';
                        tHtml += '<td style="padding:6px 2px;">📡 ' + st.name + '</td>';
                        tHtml += '<td>' + dKm + ' km</td>';
                        tHtml += '<td style="color:var(--text-muted);">' + st.red + '</td>';
                        tHtml += '<td><a href="'+mapsUrl+'" target="_blank" title="Ruta en Google Maps" style="text-decoration:none; font-size:14px;">🚗</a></td>';
                        tHtml += '</tr>';
                    });
                    document.getElementById('table_content').innerHTML = tHtml + '</table>';
                }

                window.asyncUpdateStations = function(uLatLng) {
                    const loader = document.getElementById('loader_overlay');
                    loader.style.display = 'flex';
                    setTimeout(function() {
                        try {
                            drawNearestStations(uLatLng);
                        } catch(e) {
                            console.error(e);
                        } finally {
                            setTimeout(function() { loader.style.display = 'none'; }, 400);
                        }
                    }, 100);
                }

                document.getElementById('btn_connect_stations').addEventListener('click', function() {
                    let val = parseInt(document.getElementById('num_stations').value);
                    if (isNaN(val) || val < 0) document.getElementById('num_stations').value = 0;
                    if (isTracking && globalUserLatLng) {
                        asyncUpdateStations(globalUserLatLng);
                    }
                });

                document.getElementById('go_btn').addEventListener('click', function() {
                    const btnText = document.getElementById('btn_text'), btnIcon = document.getElementById('btn_icon'), gpsPanel = document.getElementById('gps_panel'), tableContainer = document.getElementById('stations_table_container');
                    if (!navigator.geolocation) { alert("Error de GPS"); return; }

                    if (isTracking) {
                        navigator.geolocation.clearWatch(watchId); isTracking = false;
                        btnText.innerText = "Radar GPS"; btnIcon.innerText = "📍";
                        gpsPanel.style.display = 'none'; tableContainer.style.display = 'none';
                        this.style.background = 'var(--primary-color)'; this.style.color = 'white';
                        if (userMarker) { ml.removeLayer(userMarker); userMarker = null; }
                        clearLines(); globalUserLatLng = null; globalNearestCoords = null;
                    } else {
                        btnText.innerText = "Detener Radar"; btnIcon.innerText = "🛑";
                        this.style.background = 'var(--glass-bg)'; this.style.color = 'var(--text-main)';
                        let firstLock = true;

                        const loader = document.getElementById('loader_overlay');
                        document.getElementById('loader_title').innerText = "BUSCANDO SEÑAL GPS";
                        document.getElementById('loader_subtitle').innerText = "por favor espera...";
                        loader.style.display = 'flex';

                        watchId = navigator.geolocation.watchPosition(function(pos) {
                            const currentLatLng = L.latLng(pos.coords.latitude, pos.coords.longitude);

                            document.getElementById('loader_title').innerText = "CALCULANDO RUTAS";
                            document.getElementById('loader_subtitle').innerText = "esto puede tardar un momento...";

                            if (globalUserLatLng && globalUserLatLng.distanceTo(currentLatLng) < 3) {
                                if(firstLock) loader.style.display = 'none';
                                return;
                            }

                            globalUserLatLng = currentLatLng; gpsPanel.style.display = 'flex'; tableContainer.style.display = 'block';
                            if (firstLock) { ml.setView([currentLatLng.lat, currentLatLng.lng], 13); firstLock = false; }
                            
                            if (userMarker) { 
                                userMarker.setLatLng(currentLatLng); 
                            } else { 
                                userMarker = L.marker(currentLatLng, {icon: L.divIcon({html: uIconHtml, className: '', iconSize: [40, 40], iconAnchor: [20, 20]}), zIndexOffset: 1000}).addTo(ml); 
                            }

                            drawNearestStations(globalUserLatLng);
                            loader.style.display = 'none';

                        }, function(err) {
                            loader.style.display = 'none';
                            alert("Error de GPS. Verifica los permisos de tu navegador.");
                            isTracking = false;
                            btnText.innerText = "Radar GPS"; gpsPanel.style.display = 'none'; tableContainer.style.display = 'none';
                        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
                    }
                });
            }
        }, 500);
    </script>
